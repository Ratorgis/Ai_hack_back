<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI TECH</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
    body { background:#0f0f0f; color:#fff; height:100vh; display:flex; flex-direction:column; }

    #welcome { display:flex; flex-direction:column; justify-content:center; align-items:center; flex:1; gap:40px; }
    #title { font-size:136px; font-weight:800; color:#FFFF00; text-shadow:0 0 15px rgba(255,255,0,0.4); line-height:1; user-select:none; }

    .input-box { display:flex; justify-content:center; width:100%; padding:0 16px; }
    .input-area { display:flex; width:100%; max-width:600px; }
    .input-area input { flex:1; padding:13px 20px; border:none; border-radius:26px; background:#222; color:#fff; font-size:16px; outline:none; }
    .input-area input::placeholder { color:#777; }
    .input-area button { width:46px; height:46px; margin-left:12px; border:none; border-radius:50%; background:linear-gradient(135deg,#007bff,#0056b3); color:#fff; cursor:pointer; font-size:18px; }

    #chat { flex:1; overflow-y:auto; padding:20px; display:none; flex-direction:column; gap:16px; }
    .msg {
      max-width: calc(80% - 32px); /* 80% ширины минус отступы */
      padding:12px 16px;
      border-radius:18px;
      background:#252525;
      margin-left: auto; /* прижимаем к правому краю */
      margin-right: 20%; /* ← вот главный отступ */
      border-bottom-right-radius:4px;
    }

    #chatInputWrap { display:none; justify-content:center; padding:16px; background:#151515; border-top:1px solid #2a2a2a; }
  </style>
</head>
<body>
  <div id="welcome">
    <div id="title">AI TECH</div>
    <div class="input-box">
      <div class="input-area">
        <input id="startInput" placeholder="Напишите сообщение..." autocomplete="off" />
        <button id="startBtn">➤</button>
      </div>
    </div>
  </div>

  <div id="chat"></div>
  <div id="chatInputWrap">
    <div class="input-area">
      <input id="chatInput" placeholder="Сообщение..." autocomplete="off" />
      <button id="chatBtn">➤</button>
    </div>
  </div>

  <script>
    let msgs = [], sent = false;
    const el = (id) => document.getElementById(id);

    const addMsg = (txt) => {
      const div = document.createElement('div');
      div.className = 'msg';
      div.textContent = txt;
      el('chat').appendChild(div);
      el('chat').scrollTop = el('chat').scrollHeight;
    };

    const save = () => {
      if (!msgs.length) return;
      const blob = new Blob([msgs.join('\n')], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `чат_${new Date().toISOString().replace(/[:.]/g,'-').slice(0,19)}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
    };

const send = async (txt) => {
  if (!txt.trim()) return;
  if (!sent) {
    el('welcome').style.display = 'none';
    el('chat').style.display = 'flex';
    el('chatInputWrap').style.display = 'flex';
    sent = true;
  }

  // Добавляем сообщение пользователя
  addMsg("Вы: " + txt);

  try {
    // Отправляем запрос на FastAPI
    const res = await fetch("http://127.0.0.1:8000/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: txt })
    });

    if (!res.ok) throw new Error("Ошибка API");

    const data = await res.json();

    // Показываем ответ модели
    addMsg("AI: " + data.answer);
  } catch (err) {
    addMsg("⚠ Ошибка подключения к серверу: " + err.message);
  }
};

    const bind = (inp, btn) => {
      btn.onclick = () => { send(inp.value); inp.value = ''; };
      inp.onkeypress = (e) => { if (e.key === 'Enter') { send(inp.value); inp.value = ''; } };
    };

    bind(el('startInput'), el('startBtn'));
    bind(el('chatInput'), el('chatBtn'));
  </script>
</body>
</html>
